<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Custom Data Table (DataTables)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <body>
    <div id="app" class="azdo-card">
      <div class="azdo-card-header">
        <h3 class="azdo-title">Data Table</h3>
        <div class="azdo-toolbar">
          <button id="addRowBtn" type="button" class="azdo-btn">
            <span class="bowtie-icon bowtie-math-plus"></span>
            <span>Add Row</span>
          </button>
          <button id="saveBtn" type="button" class="azdo-btn azdo-btn-primary">
            <span class="bowtie-icon bowtie-save"></span>
            <span>Save to Field</span>
          </button>
          <span id="status" class="azdo-status"></span>
        </div>
      </div>

      <div class="azdo-table-wrap">
        <table id="gridTable" class="display compact azdo-table" style="width:100%">
          <thead>
            <!-- Headers and filters will be generated dynamically by DataTables -->
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <details class="azdo-debug" style="display: none;">
        <summary>Debug</summary>
        <pre id="dbg"></pre>
      </details>

      <p class="azdo-hint">
        💡 <strong>Tip:</strong> This table is fully customizable! Configure columns, data types, and validation through the Options panel when adding this control to your work item form. Data is automatically saved to your chosen work item field as JSON.
      </p>
    </div>
  </body>
</html>
